<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Ключевая строка</title>
        <style></style>
    </head>
    <body>
        <div class="myApp">Смотри в консоль!</div>

        <script>
            "use strict";

            const url = 'http://localhost:8080';

            fetch(url, {
                method: 'POST',             // *GET, POST, PUT, DELETE, etc.
                mode: 'no-cors',            // no-cors, *cors, same-origin
                cache: 'no-cache',          // *default, no-cache, reload, force-cache, only-if-cached
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    search: "<script>",
                    sites: [
                        "https://yandex.ru",
                        "https://google.com",
                        "https://rambler.ru",
                        "https://yahoo.com",
                        "https://aaaaabbbbbccccc.ru",
                        "https://xxxxxyyyyyzzzzz.com"
                    ],
                }),
                // body: '{"key": "AAA"}}' // Не валидный JSON.
                // body: ''                // Пустое тело запроса.
            }).then(data => {
                console.log(data);
            });
        </script>
    </body>
</html>
