<!--
  Программа спрашивает у пользователя температуру в градусах по Цельсию 
  (используем prompt чтобы ее получить). Используя alert программа выводит 
  данную температуру в градусах по Фаренгейту.

  Подсказка, расчёт идёт по формуле: Tf = (9 / 5) * Tc + 32, 
  где Tf – температура по Фаренгейту, Tc – температура по Цельсию.
-->

<meta charset="utf-8"/>
<script>
  "use strict";

  let nC = 0;
  let nF = 0;

  // Получим исходные данные.
  do {
    nC = prompt("Укажите темперетуру в градусах Цельсия", nC);
  } while (isNaN(nC));
  
  // Выполним рассчет.
  nC = Number(nC);
  nF = (9 / 5) * nC + 32;

  // Вернем результат.
  alert(`Указанная температура: ${nC}°C равна ${nF}°F`);
</script>
