<!--
  Пользователь, с помощью команды prompt, вводит номер билета - 6 цифр. 
  Программа определяет является ли счастливым данный билетик и выводит 
  соответстующее сообщение в консоль. Счастливый билет - билет, у которого 
  сумма первых трех цифр равна сумме последних трех цифр номера билета.
  Для выполнения задания необходимо использовать оператор % и ветвление.
  Чтобы сравнить два значения, можно использовать if и else (курс основ 
  программирования), например:

  ```
  const a = 1;
  const b = 1;
  if (a === b) {
  console.log('Две переменные a и b равны.');
  }
  ```
-->

<meta charset="utf-8"/>
<script>
  "use strict";

  let sTicketCode = "";
  let nPart1 = 0, nPart2 = 0;
  let nSum1 = 0, nSum2 = 0;

  do {
    sTicketCode = prompt("Укажите номер вашего билета (6 цифр):", sTicketCode);
  } while (sTicketCode.length !== 6 || isNaN(sTicketCode));

  // Разделим номер билета на 2 части по 3 цифры.
  nPart1 = sTicketCode % 1000;
  nPart2 = Math.floor(sTicketCode / 1000);

  // Вычислим сумму цифр первой части.
  while (nPart1 > 0) {
    nSum1 += nPart1 % 10;
    nPart1 = Math.floor(nPart1 / 10);
  }

  // Вычислим сумму цифр второй части.
  while (nPart2 > 0) {
    nSum2 += nPart2 % 10;
    nPart2 = Math.floor(nPart2 / 10);
  }

  // Вернем результат.
  if (nSum1 === nSum2) console.log("Поздравляю! У Вас счастливый билет!");
  else console.log("К сожалению, Вы проиграли.");

  alert("Жми F12, смотри в консоль!");
</script>
