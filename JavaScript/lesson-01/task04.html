<!--
  Самостоятельно разобраться с атрибутами тега script (async и defer), 
  описать комментариями для чего они, чем отличаются.
-->

<meta charset="utf-8"/>
<script>
  "use strict";

  /*
    async
    1. Загрузит JS-файл, не прерывая HTML-парсер.
    2. Загрузив JS-файл, прервет парсер и выполнит сценарий в JS-файле.
    3. Затем, если разбор HTML еще не окончен, то он продолжится.

    defer
    1. Загрузит JS-файл не прерывая HTML-парсер.
    2. Дождется окончания разбора кода HTML.
    3. Выполнит сценарий в JS-файле.
  */

  alert("Жми F12, смотри в код!");
</script>
