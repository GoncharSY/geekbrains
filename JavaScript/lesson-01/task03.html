<!--
  Вывести в консоль значения выражений и объяснить почему получились такие 
  значения используя комментарии к каждому выражению:
  ```
  10 + 10 + "10"
  10 + "10" + 10
  10 + 10 + +"10"
  10 / -""
  10 / +"2,5"
  ```
-->

<meta charset="utf-8"/>
<script>
  "use strict";

  // Операции выполняются слева-направо.
  // Сначала сложение чисел 10 + 10 = 20
  // Затем конкатенация строк '20' + '10' = '2010'.
  // ...так как один из операндов это строка.
  console.log(10 + 10 + "10"); // 2010

  // Сначала конкатенация, потому что второй операнд - строка.
  // Затем конкатенация, потому что первый операнд - строка.
  console.log(10 + "10" + 10); // 101010

  // Унарный плюс (+"10") имеет высший приоритет, поэтому 
  // сначала выполнится операция преобразования строки в число.
  // А уже затем числа просто складываются.
  console.log(10 + 10 + +"10"); // 30

  // Сначала самый приоритетный унарный минус преобразует -"" в -0.
  // Затем выполнится деление.
  console.log(10 / -""); // -Infinity

  // Сначала унарный плюс попробует преобразовать +"2,5" в число,
  // но получит NaN, так как в строке есть запятая.
  // Далее математическая операция с NaN, в результате всегда NaN.
  console.log(10 / +"2,5");

  alert("Жми F12. Смотри в консоль и в код!");
</script>
