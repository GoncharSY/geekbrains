<!--
  1 Написать функцию, преобразующую число в объект. Передавая на вход число в диапазоне [0, 999],
  мы должны получить на выходе объект, в котором в соответствующих свойствах описаны
  разряды числа:
    - единицы (в свойстве firstDigit)
    - десятки (в свойстве secondDigit)
    - сотни (в свойстве thirdDigit)
  
  Например, для числа 45 мы должны получить следующий объект:
 
  ```
    {
      firstDigit: 5,
      secondDigit: 4,
      thirdDigit: 0,
    }
  ```

  Если число было передано вне [0, 999] диапазона, не целое число или вообще не число,
  необходимо выдать соответствующее сообщение с помощью console.log и вернуть пустой объект.
-->

<meta charset="utf-8"/>
<script>
  "use strict";


  // Протестируем некорретный ввод.
  console.log(getObject("Не число")); // Вообще не число.
  console.log(getObject(123.123));    // Не целое число.
  console.log(getObject(-1));         // Число вне диапазона (мин.).
  console.log(getObject(1000));       // Число вне диапазона (макс.).

  // Протестируем нормальные ситуации.
  console.log(getObject(0));
  console.log(getObject(1));
  console.log(getObject(10));
  console.log(getObject(12));
  console.log(getObject(100));
  console.log(getObject(120));
  console.log(getObject(123));


  /**
   * Получить объект.
   * @param {int} n число для преобразования в объект
   * @return {object}
   */
  function getObject(n) {
    const obj = {};

    if (Number.isNaN(+n) || n < 0 || n > 999 || n > Math.floor(n)) {
      console.log("Некорректный параметр: необходимо целое число в диапазоне [0, 999]");
      return obj;
    }

    obj.firstDigit = n % 10;
    n = Math.floor(n / 10);

    obj.secondDigit = n % 10;
    n = Math.floor(n / 10);

    obj.thirdDigit = n;

    return obj;
  }


</script>
