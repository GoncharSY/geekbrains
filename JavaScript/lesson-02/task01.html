<!--
  Объясните почему код даёт именно такие результаты?
-->

<meta charset="utf-8"/>
<script>
  "use strict";

  let a = 1, b = 1, c, d;

  c = ++a;
  alert(c); // 2
  // Здесь к 'a' сначала прибавляется единица (1+a),
  // Затем результат присваивает к 'c'.
  // Теперь 'a' = 2.

  d = b++;
  alert(d); // 1
  // Здесь сначала значение 'b' присваивается в 'd'.
  // Затем значение 'b' увеличивается на 1;
  // Теперь 'b' = 2.

  c = 2 + ++a;
  alert(c); // 5
  // Сначала 'a' увеличивается на 1, получается 3;
  // Затем складывается с 2 получается 5;
  // Результат присвается переменной 'c'.
  // Теперь 'a' = 3.

  d = 2 + b++;
  alert(d); // 4
  // Здесь увеличение 'b' произойдет уже после присвоения.
  // Теперь 'b' = 3.
  
  alert(a); // 3
  alert(b); // 3

</script>
