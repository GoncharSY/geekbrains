<!--
  Объявить две переменные a и b и задать им целочисленные произвольные начальные 
  значения. Затем написать скрипт, который работает по следующему принципу:
    - если a и b положительные, вывести их разность (ноль можно считать положительным
      числом);
    - если а и b отрицательные, вывести их произведение;
    - если а и b разных знаков, вывести их сумму;
-->

<meta charset="utf-8"/>
<script>
  "use strict";

  let a = 3;
  let b = -5;

  do {
    a = prompt("Введите значение 'a' (целое число)", a);
    a = Number.parseInt(a);
  } while (Number.isNaN(a));

  do {
    b = prompt("Введите значение 'b' (целое число)", b);
    b = Number.parseInt(b);
  } while (Number.isNaN(b));
  
  if (a >= 0 && b >= 0) {
    alert(`a - b = ${a - b}`);
  } else if (a < 0 && b < 0) {
    alert(`a * b = ${a * b}`);
  } else {
    alert(`a + b = ${a + b}`);
  }

</script>
