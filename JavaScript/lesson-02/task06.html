<!--
  Программа должна спросить у пользователя количество денег, которое он хочет 
  положить в банк. Пользователь должен ввести целое число, а программа должна 
  выдать соответствующее сообщение:
    "Ваша сумма в 101 рубль успешно зачислена." - в случае если пользователь ввел 101
    "Ваша сумма в 10020 рублей успешно зачислена." - в случае если пользователь ввел 10020
    "Ваша сумма в 120104 рубля успешно зачислена." - в случае если пользователь ввел 120104
  Если пользователь введет любое другое целое число, программа также должна 
  выдать соответствующее сообщение, в котором будет отображено это число, а 
  также поставить верное окончание в слове "рубль". Для получения верного 
  склонения слова (любого слова с числом) вам необходимо создать функцию.
-->

<meta charset="utf-8"/>
<script>
  "use strict";

  let money = 0;

  do {
    money = prompt("Укажите сумму вклада (целое число)");
    money = Number.parseInt(money);
  } while (Number.isNaN(money));

  alert(`Ваша сумма в ${money} ${getCurrency(money)} успешно зачислена.`);

  /**
   * Получить валюту в нужном склонении.
   * @param {Integer} i величина, после которой будет записана валюта.
   * @return {String}
   */
  function getCurrency(i) {
    i = i % 100;

    // Особые случаи 11, 12, 13, 14.
    if (i > 10 && i < 15) {
      return "рублей";
    }

    i = i % 10;

    // Обычные случаи.
    if (i === 1) {
      return "рубль";
    } else if (i > 1 && i < 5) {
      return "рубля";
    } else {
      return "рублей";
    }
  }

</script>
