<!--
  Чему будут равны переменные x и a в примере ниже? 
  Написать почему так произошло (описать последовательность действий).
  let a = 2;
  let x = 1 + (a *= 2);
-->

<meta charset="utf-8"/>
<script>
  "use strict";

  let a = 2;
  let x = 1 + (a *= 2);

  // Сначала выполнится операция в скобках: a = a * 2 a именно 2 * 2 = 4.
  // Затем в 'x' попадет значение 1 + 4 = 5.
  // В итоге получится: a = 4, x = 5.

</script>
