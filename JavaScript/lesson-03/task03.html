<!--
  Нарисовать горку с помощью console.log (используя цикл for), как показано на
  рисунке, только у вашей горки должно быть 20 рядов, а не 5:
  
  ```
  xxx
  xxxxx
  xxxxxxx
  xxxxxxxxx
  ```
-->

<meta charset="utf-8"/>
<script>
  "use strict";

  for (let itr = 0; itr < 20; itr++) {
    console.log("x".repeat(itr + 3));
  }
</script>
