<!--
  С помощью цикла while вывести все простые числа в промежутке от 0 до 100
  (можно без оптимизаций).

  Википедия:
  Просто́е число́ — натуральное (целое положительное) число, имеющее ровно два 
  различных натуральных делителя — единицу и самого себя.
-->

<meta charset="utf-8"/>
<script>
  "use strict";

  let itr = 2;        // Исходя из определения, имеет смысл начать искать с 2.
  const primes = [];  // Массив найденных простых чисел.
  const to = 100;     // Верхний предел поиска.

  while (itr <= to) {
    let isPrime = true;
    let idx = 0;

    // Определим, простое ли число.
    while (idx < primes.length) {
      if (itr % primes[idx] === 0) {
        isPrime = false;
        break;
      }

      idx++;
    }

    // Если простое...
    if (isPrime) {
      primes.push(itr);
      console.log(itr);
    }

    itr++;
  }
</script>
