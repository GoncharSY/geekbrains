<!--
  С помощью цикла do…while написать алгоритм для вывода чисел от 0 до 10
  включительно, чтобы результат выглядел так:
  
  0 – это ноль
  1 – нечетное число
  2 – четное число
  3 – нечетное число
  ...
  10 – четное число
-->

<meta charset="utf-8"/>
<script>
  "use strict";

  let itr = 0;

  do {
    if (itr === 0) {
      console.log(`${itr} - это ноль`);
    } else if (itr % 2 === 0) {
      console.log(`${itr} - четное число`);
    } else {
      console.log(`${itr} - нечетное число`);
    }

    itr++;
  } while (itr <= 10);

</script>
